<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where 2 Watch — قائمة مشاركة</title>
<meta name="description" content="شخص شاركك قائمته المفضلة من الأفلام والمسلسلات. حمّل التطبيق لمشاهدتها كاملة.">

<!-- Open Graph للمعاينة في التطبيقات -->
<meta property="og:title" content="قائمة من Where 2 Watch">
<meta property="og:description" content="شخص شاركك قائمته المفضلة من الأفلام والمسلسلات">
<meta property="og:image" content="https://eashalan.github.io/popcorn_1200x630.png">
<meta property="og:url" content="https://eashalan.github.io/w2w/">
<meta property="og:type" content="website">

<!-- Twitter/X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://eashalan.github.io/popcorn_1200x630.png">

<!-- أيقونة المتصفح -->
<link rel="icon" type="image/png" href="https://eashalan.github.io/w2w-icon.png">
<link rel="apple-touch-icon" href="https://eashalan.github.io/w2w-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Beiruti:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Beiruti", -apple-system, sans-serif;
    background: linear-gradient(135deg, #1a1633 0%, #2d1b4e 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 40px 28px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .emoji { font-size: 56px; margin-bottom: 12px; }
  h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .subtitle { font-size: 16px; opacity: 0.75; margin-bottom: 24px; line-height: 1.6; font-weight: 400; }
  .stats {
    background: rgba(139, 92, 246, 0.15);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-around;
    gap: 12px;
  }
  .stat-item { flex: 1; }
  .stat-number {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #c4b5fd, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }
  .stat-label { font-size: 12px; opacity: 0.7; margin-top: 4px; font-weight: 600; }
  .divider { width: 1px; background: rgba(255,255,255,0.1); }
  .cta {
    display: inline-block;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    color: #fff;
    text-decoration: none;
    padding: 16px 40px;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
    transition: transform 0.2s;
  }
  .cta:hover { transform: translateY(-2px); }
  .features {
    margin-top: 28px;
    text-align: right;
    font-size: 14px;
    opacity: 0.75;
    line-height: 2.2;
    font-weight: 400;
  }
  .footer { margin-top: 24px; font-size: 12px; opacity: 0.5; font-weight: 400; }
  .empty-msg { font-size: 14px; opacity: 0.6; margin-bottom: 24px; }
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎬</div>
    <h1>شارَكَك صديقك قائمته</h1>
    <p class="subtitle">من تطبيق <strong>Where 2 Watch</strong><br>اكتشف ذوقه وحمّل التطبيق</p>

    <div class="stats" id="stats">
      <div class="stat-item">
        <div class="stat-number" id="count">—</div>
        <div class="stat-label">عمل مُقيَّم</div>
      </div>
      <div class="divider"></div>
      <div class="stat-item">
        <div class="stat-number" id="top">—</div>
        <div class="stat-label">أعلى تقييم</div>
      </div>
    </div>

    <p class="empty-msg">🔒 لمشاهدة القائمة كاملة، حمّل التطبيق</p>

    <a href="#" class="cta">📱 تحميل من App Store</a>

    <div class="features">
      • ترشيحات تناسب مزاجك ووقتك<br>
      • فلتر حسب منصاتك (نتفليكس، شاهد، Disney+…)<br>
      • قيّم وشارك قوائمك مع أصحابك
    </div>

    <p class="footer">Where 2 Watch © 2026</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const n = parseInt(params.get('n')) || 0;
    const top = parseInt(params.get('top')) || 0;
    if (n > 0) document.getElementById('count').textContent = n;
    if (top > 0) document.getElementById('top').textContent = top + '/10';
  </script>
</body>
</html>
