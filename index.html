<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where 2 Watch — قائمة مشاركة</title>
<meta name="description" content="شخص شاركك قائمته المفضلة من الأفلام والمسلسلات. حمّل التطبيق لمشاهدتها كاملة.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "SF Arabic", "Tajawal", sans-serif;
    background: linear-gradient(135deg, #1a1633 0%, #2d1b4e 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 40px 28px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .emoji { font-size: 56px; margin-bottom: 12px; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .subtitle { font-size: 15px; opacity: 0.75; margin-bottom: 28px; line-height: 1.5; }
  .stats {
    background: rgba(139, 92, 246, 0.15);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 28px;
  }
  .stats p { font-size: 14px; opacity: 0.85; line-height: 1.8; }
  .cta {
    display: inline-block;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    color: #fff;
    text-decoration: none;
    padding: 16px 40px;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
    transition: transform 0.2s;
  }
  .cta:hover { transform: translateY(-2px); }
  .features {
    margin-top: 28px;
    text-align: right;
    font-size: 13px;
    opacity: 0.7;
    line-height: 2;
  }
  .footer { margin-top: 24px; font-size: 12px; opacity: 0.5; }
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎬</div>
    <h1>شارَكَك صديقك قائمته</h1>
    <p class="subtitle">من تطبيق <strong>Where 2 Watch</strong><br>اكتشف ذوقه وحمّل التطبيق</p>

    <div class="stats">
      <p>✨ قائمة أفلام ومسلسلات مفضلة<br>🔒 لمشاهدتها، حمّل التطبيق</p>
    </div>

    <a href="#" class="cta">📱 تحميل من App Store</a>

    <div class="features">
      • ترشيحات تناسب مزاجك ووقتك<br>
      • فلتر حسب منصاتك (نتفليكس، شاهد، Disney+…)<br>
      • قيّم وشارك قوائمك مع أصحابك
    </div>

    <p class="footer">Where 2 Watch © 2026</p>
  </div>
</body>
</html>
